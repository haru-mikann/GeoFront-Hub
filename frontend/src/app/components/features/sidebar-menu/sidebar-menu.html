<nav class="sidebar">
  <div class="sidebar-brand">
    <span class="brand-tag terminal-label">NERV HQ</span>
    <div class="brand-logo">MAGI</div>
    <span class="brand-sub terminal-label">SYSTEM v0.1</span>
  </div>

  <ul class="nav-list">
    @for (item of navItems; track item.id) {
      <li
        class="nav-item"
        [class.active]="item.active"
        [class.disabled]="!item.available"
      >
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-label">{{ item.label }}</span>
        @if (!item.available) {
          <span class="nav-badge">OFFLINE</span>
        }
      </li>
    }
  </ul>

  <div class="sidebar-footer">
    <div class="status-row">
      <span class="status-dot ok"></span>
      <span class="status-text terminal-label">MAGI ONLINE</span>
    </div>
    <div class="status-row">
      <span class="status-dot ok"></span>
      <span class="status-text terminal-label">BACKEND OK</span>
    </div>
  </div>
</nav>
