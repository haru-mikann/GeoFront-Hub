<app-ui-card label="MAGI SYSTEM" title="Terminal Log">
  <div class="log-container">
    @for (entry of logs; track $index) {
      <div class="log-entry">
        <span class="log-time">{{ entry.timestamp | date:'HH:mm:ss' }}</span>
        <span class="log-level" [class]="entry.level.toLowerCase()">{{ entry.level }}</span>
        <span class="log-msg">{{ entry.message }}</span>
      </div>
    }
  </div>
</app-ui-card>
